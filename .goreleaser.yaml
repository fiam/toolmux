version: 2

project_name: supacli

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

builds:
  - id: supacli
    main: ./cmd/supacli
    binary: supacli
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/fiam/supacli/internal/version.Version={{ .Version }}
archives:
  - id: supacli
    ids:
      - supacli
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

kos:
  - id: supaclid
    build: supacli
    main: ./cmd/supaclid
    repositories:
      - ghcr.io/fiam/supaclid
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "{{ .Tag }}"
    bare: true
    preserve_import_paths: false
    sbom: none
    labels:
      org.opencontainers.image.source: "https://github.com/fiam/supacli"
      org.opencontainers.image.licenses: MIT
    annotations:
      org.opencontainers.image.source: "https://github.com/fiam/supacli"
      org.opencontainers.image.description: "Supacli server daemon."
      org.opencontainers.image.licenses: MIT
    env:
      - CGO_ENABLED=0
    creation_time: "{{ .CommitTimestamp }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

release:
  github:
    owner: fiam
    name: supacli
  mode: keep-existing
  replace_existing_artifacts: true

brews:
  - name: supacli
    ids:
      - supacli
    repository:
      owner: fiam
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/fiam/supacli"
    description: "Local-first CLI for working with SaaS tools from one policy-aware command surface."
    license: MIT
    commit_msg_template: "brew: update supacli to {{ .Tag }}"
    install: |
      bin.install "supacli"
    test: |
      system "#{bin}/supacli", "version"
