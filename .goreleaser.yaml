version: 2

project_name: supacli

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

builds:
  - id: supacli
    main: ./cmd/supacli
    binary: supacli
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/fiam/supacli/internal/version.Version={{ .Version }}
        -X github.com/fiam/supacli/internal/version.Commit={{ .Commit }}
        -X github.com/fiam/supacli/internal/version.Date={{ .Date }}
  - id: supaclid
    main: ./cmd/supaclid
    binary: supaclid
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/fiam/supacli/internal/version.Version={{ .Version }}
        -X github.com/fiam/supacli/internal/version.Commit={{ .Commit }}
        -X github.com/fiam/supacli/internal/version.Date={{ .Date }}

archives:
  - id: supacli
    ids:
      - supacli
      - supaclid
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

release:
  github:
    owner: fiam
    name: supacli
  mode: keep-existing
  replace_existing_artifacts: true

brews:
  - name: supacli
    ids:
      - supacli
    repository:
      owner: fiam
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/fiam/supacli"
    description: "Local-first CLI for working with SaaS tools from one policy-aware command surface."
    license: MIT
    commit_msg_template: "brew: update supacli to {{ .Tag }}"
    install: |
      bin.install "supacli"
      bin.install "supaclid"
    test: |
      system "#{bin}/supacli", "version"
