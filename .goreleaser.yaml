version: 2

project_name: toolmux

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

builds:
  - id: toolmux-darwin
    main: ./cmd/toolmux
    binary: toolmux
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/fiam/toolmux/internal/version.Version={{ .Version }}
  - id: toolmux-cross
    main: ./cmd/toolmux
    binary: toolmux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/fiam/toolmux/internal/version.Version={{ .Version }}
archives:
  - id: toolmux
    ids:
      - toolmux-darwin
      - toolmux-cross
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

kos:
  - id: toolmuxd
    build: toolmux-cross
    main: ./cmd/toolmuxd
    repositories:
      - ghcr.io/fiam/toolmuxd
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "{{ .Tag }}"
    bare: true
    preserve_import_paths: false
    sbom: none
    labels:
      org.opencontainers.image.source: "https://github.com/fiam/toolmux"
      org.opencontainers.image.licenses: MIT
    annotations:
      org.opencontainers.image.source: "https://github.com/fiam/toolmux"
      org.opencontainers.image.description: "Toolmux server daemon."
      org.opencontainers.image.licenses: MIT
    env:
      - CGO_ENABLED=0
    creation_time: "{{ .CommitTimestamp }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

notarize:
  macos:
    - enabled: '{{ isEnvSet "APPLE_CODESIGN_CERT_P12_BASE64" }}'
      ids:
        - toolmux-darwin
      sign:
        certificate: "{{ .Env.APPLE_CODESIGN_CERT_P12_BASE64 }}"
        password: "{{ .Env.APPLE_CODESIGN_CERT_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.APPLE_NOTARY_API_ISSUER_ID }}"
        key_id: "{{ .Env.APPLE_NOTARY_API_KEY_ID }}"
        key: "{{ .Env.APPLE_NOTARY_API_KEY_PATH }}"
        wait: true
        timeout: 20m

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

release:
  github:
    owner: fiam
    name: toolmux
  mode: keep-existing
  replace_existing_artifacts: true

homebrew_casks:
  - name: toolmux
    ids:
      - toolmux
    binaries:
      - toolmux
    repository:
      owner: fiam
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/fiam/toolmux"
    description: "Local-first CLI for working with SaaS tools from one policy-aware command surface."
    commit_msg_template: "brew: update toolmux cask to {{ .Tag }}"
