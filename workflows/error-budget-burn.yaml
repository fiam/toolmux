version: 1
name: error-budget-burn
description: Diagnose SLO error-budget burn over a window, correlate with incidents, and draft a burn report
requires:
  - catalog:grafana
  - catalog:incident-io
  - catalog:notion
inputs:
  window:
    type: duration
    description: Reporting window
    default: 7d
  prometheus_datasource:
    description: Grafana Prometheus datasource UID or name
  slo_target_percent:
    type: int
    description: SLO target (success ratio percent, e.g. 99 for 99%)
    default: "99"
  service:
    description: Service or component name used to filter metrics
  notion_parent:
    description: Notion parent page or database for the burn-down doc. Empty = leave the page unfiled.
    default: ""
steps:
  - id: budget
    name: Calculating error-budget burn
    outputs:
      slo:
        type: json
        description: SLO snapshot for the window
        schema:
          type: object
          required: [target_percent, achieved_percent, budget_consumed_percent, burn_windows]
          properties:
            target_percent:           { type: number }
            achieved_percent:         { type: number }
            budget_consumed_percent:  { type: number }
            burn_windows:
              type: array
              items:
                type: object
                required: [start, end, error_rate]
                properties:
                  start:      { type: string }
                  end:        { type: string }
                  error_rate: { type: number }
    prompt: |
      For service "{{ .inputs.service }}" with SLO target
      {{ .inputs.slo_target_percent }}%, compute error-budget burn over
      the past {{ .inputs.window }} using Grafana datasource
      {{ .inputs.prometheus_datasource }}.

      - Use query_prometheus to fetch success-ratio over the window.
        Typical queries pair a success counter with a total counter.
      - Identify burn windows (sub-intervals where error rate exceeded
        the target for a sustained period).
      - Report achieved_percent and budget_consumed_percent.

  - id: incidents
    name: Correlating incidents
    outputs:
      list:
        type: json
        description: Incidents that overlap any burn window
        schema:
          type: array
          items:
            type: object
            required: [reference, name, severity, start, end]
            properties:
              reference: { type: string }
              name:      { type: string }
              severity:  { type: string }
              start:     { type: string }
              end:       { type: string }
    prompt: |
      Use incident_list to fetch incidents from the past
      {{ .inputs.window }}, then return only those whose active window
      intersects any burn window from the previous step:

      {{ .steps.budget.outputs.slo }}

  - name: Drafting burn-down doc
    prompt: |
      Create a Notion page titled "{{ .inputs.service }} error budget — past {{ .inputs.window }}"
      {{ if .inputs.notion_parent }}under parent {{ .inputs.notion_parent }}{{ end }}
      using notion-create-pages with this Markdown body, then print the
      page URL on a final standalone line.

      ## SLO
      - Target: {{ .inputs.slo_target_percent }}%
      - Achieved: (see snapshot below)
      - Budget consumed: (see snapshot below)

      ## Snapshot
      {{ .steps.budget.outputs.slo }}

      ## Burn windows correlated with incidents
      {{ .steps.incidents.outputs.list }}

      ## Recommended actions
      (Agent writes 3–5 actionable bullets grounded in the burn windows
      and correlated incidents. Do not call any tools for this section.)
