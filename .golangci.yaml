version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - errorlint
    - govet
    - ineffassign
    - modernize
    - nilerr
    - paralleltest
    - staticcheck
    - unconvert
    - unused
    - whitespace

formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/fiam/toolmux)
      custom-order: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
