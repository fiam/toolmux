version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - errorlint
    - govet
    - ineffassign
    - modernize
    - nilerr
    - staticcheck
    - unconvert
    - unused
    - whitespace

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
