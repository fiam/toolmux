name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.3"
  GOFLAGS: -mod=readonly

defaults:
  run:
    shell: bash

jobs:
  release:
    name: release-please
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Check out release tag
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Set up Go
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Validate release secrets
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          APPLE_CODESIGN_CERT_P12_BASE64: ${{ secrets.APPLE_CODESIGN_CERT_P12_BASE64 }}
          APPLE_CODESIGN_CERT_PASSWORD: ${{ secrets.APPLE_CODESIGN_CERT_PASSWORD }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
          APPLE_NOTARY_API_PRIVATE_KEY: ${{ secrets.APPLE_NOTARY_API_PRIVATE_KEY }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          required_vars=(
            APPLE_CODESIGN_CERT_P12_BASE64
            APPLE_CODESIGN_CERT_PASSWORD
            APPLE_NOTARY_API_KEY_ID
            APPLE_NOTARY_API_ISSUER_ID
            APPLE_NOTARY_API_PRIVATE_KEY
            HOMEBREW_TAP_GITHUB_TOKEN
          )

          missing=()
          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required release secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Write App Store Connect API key
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          APPLE_NOTARY_API_PRIVATE_KEY: ${{ secrets.APPLE_NOTARY_API_PRIVATE_KEY }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_API_KEY_ID}.p8"
          printf '%s' "$APPLE_NOTARY_API_PRIVATE_KEY" > "$KEY_PATH"
          echo "APPLE_NOTARY_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Install registry auth helper
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          go install github.com/google/go-containerregistry/cmd/crane@v0.20.6
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Log in to GHCR
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: crane auth login ghcr.io -u "${{ github.actor }}" -p "$GITHUB_TOKEN"

      - name: Publish release artifacts
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          APPLE_CODESIGN_CERT_P12_BASE64: ${{ secrets.APPLE_CODESIGN_CERT_P12_BASE64 }}
          APPLE_CODESIGN_CERT_PASSWORD: ${{ secrets.APPLE_CODESIGN_CERT_PASSWORD }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
